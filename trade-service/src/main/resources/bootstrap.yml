spring:
  application:
    name: trade-service
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: localhost:8848
      config:
        file-extension: yml
        shared-configs:
          - data-id: shared-jdbc.yml
            refresh: true # 建议加上，支持动态刷新
          - data-id: shared-log.yml
          - data-id: shared-swagger.yml
          - data-id: shared-seata.yml
          - data-id: shared-rabbitMQ.yml
